version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ragdb
      VECTOR_DB_PATH: /app/chroma_db
      STORAGE_PATH: /app/storage
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - chroma_data:/app/chroma_db
      - storage_data:/app/storage
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ragdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # On first startup, pull the model automatically then keep serving.
    # Subsequent restarts skip the pull because the model is cached in the volume.
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull llama3.2 && wait"]
    restart: unless-stopped

volumes:
  postgres_data:
  chroma_data:
  storage_data:
  ollama_data: